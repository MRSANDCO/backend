# Unified Test properties
spring.application.name=backend-test

# Embedded MongoDB (via flapdoodle)
spring.data.mongodb.database=ca_firm_test_db
de.flapdoodle.mongodb.embedded.version=5.0.5

# Admin credentials for tests
app.admin.username=admin
app.admin.password=admin123

# Mock JWT secrets for JwtUtil creation in tests
app.jwt.secret=mockSecretKeyThatIsAtLeast32BytesLongForHS256Algorithm
app.jwt.expiration-ms=86400000

# Use random port for web server
server.port=0

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
