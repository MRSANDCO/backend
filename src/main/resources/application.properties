spring.application.name=backend
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/ca_firm_db}


# Auth is embedded in the URI string — do NOT set these separately
# spring.data.mongodb.username=
# spring.data.mongodb.password=
# spring.data.mongodb.authentication-database=

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# Admin credentials — MUST be set via environment variables. No defaults.
app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}

# File Upload Limits (for PDF uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.port=8083

# JWT — MUST be set via environment variables. No defaults.
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# # logging.level.org.springframework.security=TRACE
# logging.level.org.springframework.web=TRACE
