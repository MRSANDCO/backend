spring.application.name=backend
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/ca_firm_db}

# No authentication (container running without auth)
# spring.data.mongodb.username=
# spring.data.mongodb.password=
# spring.data.mongodb.authentication-database=

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# Admin credentials (override via environment variables in production)
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}

# File Upload Limits (for PDF uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.port=8083

# JWT Configuration
app.jwt.secret=${JWT_SECRET:CaFirmSecretKey2024MustBeAtLeast32BytesLong!!}
app.jwt.expiration-ms=86400000

# # logging.level.org.springframework.security=TRACE
# logging.level.org.springframework.web=TRACE
